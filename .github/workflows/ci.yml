name: CI Pipeline

on:
  push:
    branches: [setup-task]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: Winodw

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
          python-version: '3.13'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt